<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaleSnap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #faf7f2;
      color: #333;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #title {
      font-size: 1rem;
      padding: 8px 16px;
      color: #555;
      text-align: center;
      flex-shrink: 0;
    }

    #reader {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      width: 100%;
      max-width: 1200px;
      flex: 1;
      min-height: 0;
      padding: 0 16px 12px;
      gap: 24px;
    }

    #illustration-wrap {
      height: 100%;
      aspect-ratio: 3 / 2;
      flex-shrink: 0;
      background: #e8e4dc;
      border-radius: 12px;
      overflow: hidden;
    }

    #illustration {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s ease;
    }

    #right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #text-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 8px;
      text-align: center;
      overflow: auto;
    }

    #page-text {
      font-size: 1.15rem;
      line-height: 1.7;
      transition: opacity 0.18s ease;
    }

    #nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding-bottom: 4px;
      flex-shrink: 0;
    }

    .arrow {
      background: none;
      border: 2px solid #ccc;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s;
    }

    .arrow:hover:not(:disabled) { border-color: #666; }
    .arrow:disabled { opacity: 0.2; cursor: default; }

    #page-indicator {
      font-size: 0.75rem;
      color: #bbb;
      min-width: 40px;
      text-align: center;
    }

    #topbar {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      flex-shrink: 0;
    }

    #back, #download {
      font-size: 0.8rem;
      color: #bbb;
      text-decoration: none;
      padding: 8px 0;
      transition: color 0.15s;
    }

    #back:hover, #download:hover { color: #888; }

    #download { visibility: hidden; }

    #error {
      padding: 48px 24px;
      color: #c00;
      text-align: center;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<div id="topbar">
  <a id="back" href="/new">← Stories</a>
  <a id="download" href="#">Save as PDF</a>
</div>
<div id="title"></div>

<div id="reader">
  <div id="illustration-wrap">
    <img id="illustration" alt="Illustration" />
  </div>
  <div id="right-panel">
    <div id="text-area">
      <p id="page-text"></p>
    </div>
    <div id="nav">
      <button class="arrow" id="prev">&#8592;</button>
      <span id="page-indicator"></span>
      <button class="arrow" id="next">&#8594;</button>
    </div>
  </div>
</div>

<div id="error" style="display:none"></div>

<script>
  const params = new URLSearchParams(location.search);
  const storyId = params.get('story_id');

  const titleEl = document.getElementById('title');
  const imgEl = document.getElementById('illustration');
  const textEl = document.getElementById('page-text');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');
  const indicatorEl = document.getElementById('page-indicator');
  const errorEl = document.getElementById('error');
  const downloadEl = document.getElementById('download');

  let pages = [];
  let current = 0;
  let currentImagePath = null;
  let firstRender = true;

  function showError(msg) {
    document.getElementById('reader').style.display = 'none';
    errorEl.style.display = 'block';
    errorEl.textContent = msg;
  }

  function render() {
    const page = pages[current];
    const isFirst = firstRender;
    firstRender = false;

    if (isFirst) {
      textEl.textContent = page.text;
    } else {
      textEl.style.opacity = '0';
      setTimeout(() => {
        textEl.textContent = page.text;
        textEl.style.opacity = '1';
      }, 180);
    }

    const newPath = page.illustration_path ? '/' + page.illustration_path : null;
    if (newPath && newPath !== currentImagePath) {
      if (!isFirst) imgEl.style.opacity = '0';
      imgEl.src = newPath;
      currentImagePath = newPath;
      imgEl.onload = () => { imgEl.style.opacity = '1'; };
    }

    indicatorEl.textContent = `${current + 1} / ${pages.length}`;
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === pages.length - 1;
  }

  prevBtn.addEventListener('click', () => { if (current > 0) { current--; render(); } });
  nextBtn.addEventListener('click', () => { if (current < pages.length - 1) { current++; render(); } });

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' && current > 0) { current--; render(); }
    if (e.key === 'ArrowRight' && current < pages.length - 1) { current++; render(); }
  });

  async function load() {
    if (!storyId) {
      showError('No story_id provided. Add ?story_id=... to the URL.');
      return;
    }
    const res = await fetch(`/stories/${storyId}`);
    if (!res.ok) {
      showError(`Story not found: ${storyId}`);
      return;
    }
    const story = await res.json();
    titleEl.textContent = story.title;
    document.title = story.title + ' — TaleSnap';
    downloadEl.href = `/stories/${storyId}/pdf`;
    downloadEl.style.visibility = 'visible';
    pages = story.pages.sort((a, b) => a.page_number - b.page_number);
    render();
  }

  load();
</script>
</body>
</html>
