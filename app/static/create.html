<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaleSnap — New Story</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #faf7f2;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    #app {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 1rem;
      color: #555;
      text-align: center;
      margin-bottom: 32px;
      font-weight: normal;
      letter-spacing: 0.04em;
    }

    .field-label {
      font-size: 0.8rem;
      color: #888;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }

    textarea {
      width: 100%;
      height: 140px;
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      font-family: Georgia, serif;
      font-size: 1rem;
      line-height: 1.6;
      color: #333;
      background: #fff;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #aaa; }
    textarea::placeholder { color: #bbb; }

    .tone-section {
      margin-top: 24px;
    }

    .tone-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .tone-card {
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 18px 12px;
      cursor: pointer;
      text-align: center;
      font-family: Georgia, serif;
      font-size: 0.95rem;
      color: #777;
      background: #fff;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      user-select: none;
    }

    .tone-card:hover { border-color: #bbb; color: #555; }

    .tone-card.selected {
      border-color: #999;
      background: #f0ece3;
      color: #333;
    }

    .tone-card .tone-name {
      display: block;
      font-size: 0.95rem;
    }

    #create-btn {
      margin-top: 28px;
      width: 100%;
      background: none;
      border: 2px solid #ccc;
      border-radius: 10px;
      padding: 14px;
      font-family: Georgia, serif;
      font-size: 1rem;
      color: #555;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    #create-btn:hover:not(:disabled) { border-color: #888; color: #333; }
    #create-btn:disabled { opacity: 0.4; cursor: default; }

    #status-view {
      display: none;
      text-align: center;
    }

    #status-msg {
      font-size: 1.1rem;
      color: #555;
      line-height: 1.7;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    #status-msg { animation: pulse 2.2s ease-in-out infinite; }

    #error-msg {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #c00;
      display: none;
    }

    #past-stories {
      margin-top: 40px;
      border-top: 1px solid #e8e3da;
      padding-top: 24px;
    }

    #past-stories .field-label {
      margin-bottom: 12px;
    }

    #story-list {
      max-height: 160px;
      overflow-y: auto;
    }

    .story-link {
      display: block;
      padding: 10px 0;
      color: #555;
      text-decoration: none;
      font-size: 0.95rem;
      border-bottom: 1px solid #ede9e0;
      transition: color 0.15s;
    }

    .story-link:last-child { border-bottom: none; }
    .story-link:hover { color: #333; }

    #usage-bar {
      margin-bottom: 28px;
      display: none;
    }

    #usage-label {
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    #usage-dots {
      display: flex;
      gap: 8px;
    }

    .usage-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e0dbd0;
      transition: background 0.2s;
    }

    .usage-dot.used { background: #aaa; }
  </style>
</head>
<body>

<div id="app">
  <h1>TaleSnap</h1>

  <div id="usage-bar">
    <div id="usage-label">
      <span>Stories today</span>
      <span id="usage-count"></span>
    </div>
    <div id="usage-dots"></div>
  </div>

  <div id="form-view">
    <label class="field-label" for="memory-input">A memory to bring to life</label>
    <textarea
      id="memory-input"
      placeholder="Tell us about a moment, a place, a feeling..."
    ></textarea>

    <div class="tone-section">
      <span class="field-label">Tone</span>
      <div class="tone-grid">
        <div class="tone-card" data-tone="funny"><span class="tone-name">Funny</span></div>
        <div class="tone-card" data-tone="adventurous"><span class="tone-name">Adventurous</span></div>
        <div class="tone-card selected" data-tone="gentle"><span class="tone-name">Gentle</span></div>
        <div class="tone-card" data-tone="moral"><span class="tone-name">Moral</span></div>
      </div>
    </div>

    <button id="create-btn">Create Story</button>
    <div id="error-msg"></div>
  </div>

  <div id="status-view">
    <p id="status-msg">Weaving your story...</p>
  </div>

  <div id="past-stories" style="display:none">
    <span class="field-label">Your stories</span>
    <div id="story-list"></div>
  </div>
</div>

<script>
  let selectedTone = 'gentle';

  document.querySelectorAll('.tone-card').forEach(card => {
    card.addEventListener('click', () => {
      document.querySelectorAll('.tone-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedTone = card.dataset.tone;
    });
  });

  document.getElementById('create-btn').addEventListener('click', async () => {
    const memory = document.getElementById('memory-input').value.trim();
    if (!memory) {
      document.getElementById('memory-input').focus();
      return;
    }

    document.getElementById('create-btn').disabled = true;
    document.getElementById('error-msg').style.display = 'none';

    let storyId;
    try {
      const res = await fetch('/stories/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ memory, tone: selectedTone }),
      });
      if (res.status === 429) {
        const data = await res.json();
        showError(data.detail || 'Daily story limit reached. Come back tomorrow!');
        document.getElementById('create-btn').disabled = false;
        return;
      }
      if (res.status === 401) {
        location.href = '/login';
        return;
      }
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      storyId = data.story_id;
      if (data.status === 'complete') {
        location.href = `/read?story_id=${storyId}`;
        return;
      }
    } catch (err) {
      showError('Something went wrong. Please try again.');
      document.getElementById('create-btn').disabled = false;
      return;
    }

    document.getElementById('form-view').style.display = 'none';
    document.getElementById('status-view').style.display = 'block';

    poll(storyId);
  });

  async function poll(storyId) {
    try {
      const res = await fetch(`/stories/${storyId}/status`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      if (data.status === 'complete') {
        location.href = `/read?story_id=${storyId}`;
        return;
      }
      if (data.status === 'error') {
        document.getElementById('status-view').style.display = 'none';
        document.getElementById('form-view').style.display = 'block';
        showError('Generation failed. Please try again.');
        document.getElementById('create-btn').disabled = false;
        return;
      }
    } catch (_) {}
    setTimeout(() => poll(storyId), 3000);
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function loadPastStories() {
    try {
      const res = await fetch('/stories');
      if (!res.ok) return;
      const stories = await res.json();
      const complete = stories.filter(s => s.status === 'complete');
      if (!complete.length) return;
      const list = document.getElementById('story-list');
      complete.forEach(s => {
        const a = document.createElement('a');
        a.className = 'story-link';
        a.href = `/read?story_id=${s.story_id}`;
        a.textContent = s.title;
        list.appendChild(a);
      });
      document.getElementById('past-stories').style.display = 'block';
    } catch (_) {}
  }

  loadPastStories();

  async function loadUsageStatus() {
    try {
      const res = await fetch('/auth/status');
      if (!res.ok) return;
      const data = await res.json();
      if (!data.authenticated || data.is_admin) return;
      const limit = data.daily_limit;
      const used = data.generations_today;
      const bar = document.getElementById('usage-bar');
      const dots = document.getElementById('usage-dots');
      const countEl = document.getElementById('usage-count');
      dots.innerHTML = '';
      for (let i = 0; i < limit; i++) {
        const dot = document.createElement('div');
        dot.className = 'usage-dot' + (i < used ? ' used' : '');
        dots.appendChild(dot);
      }
      countEl.textContent = `${used} / ${limit}`;
      bar.style.display = 'block';
      if (used >= limit) {
        document.getElementById('create-btn').disabled = true;
        showError('Daily story limit reached. Come back tomorrow!');
      }
    } catch (_) {}
  }

  loadUsageStatus();
</script>
</body>
</html>
