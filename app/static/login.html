<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaleSnap — Access</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #faf7f2;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    #app {
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    h1 {
      font-size: 1.6rem;
      color: #444;
      margin-bottom: 8px;
      font-weight: normal;
      letter-spacing: 0.02em;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #999;
      margin-bottom: 40px;
      letter-spacing: 0.03em;
    }

    .field-label {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
      text-align: left;
    }

    input[type="text"] {
      width: 100%;
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 14px 16px;
      font-family: Georgia, serif;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      color: #333;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      text-align: center;
    }

    input[type="text"]:focus { border-color: #aaa; }
    input[type="text"]::placeholder {
      color: #ccc;
      letter-spacing: 0.04em;
      font-size: 0.95rem;
    }

    button {
      margin-top: 16px;
      width: 100%;
      background: none;
      border: 2px solid #ccc;
      border-radius: 10px;
      padding: 14px;
      font-family: Georgia, serif;
      font-size: 1rem;
      color: #555;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    button:hover { border-color: #888; color: #333; }

    .error-msg {
      margin-top: 14px;
      font-size: 0.9rem;
      color: #c00;
    }
  </style>
</head>
<body>

<div id="app">
  <h1>TaleSnap</h1>
  <p class="subtitle">Turn memories into stories</p>

  <form method="POST" action="/auth/login">
    <label class="field-label" for="code-input">Access code</label>
    <input
      type="text"
      id="code-input"
      name="code"
      placeholder="Enter your code"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      autofocus
    >
    <button type="submit">Continue</button>
  </form>

  <div id="error-msg" class="error-msg" style="display:none">
    That code isn't recognised. Please check and try again.
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  if (params.get('error')) {
    document.getElementById('error-msg').style.display = 'block';
  }
</script>
</body>
</html>
